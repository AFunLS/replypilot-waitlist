<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff453a"/>
      <stop offset="1" stop-color="#ffd60a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="transparent"/>

  <g filter="url(#shadow)">
    <rect x="90" y="70" width="1020" height="620" rx="28" fill="rgba(15,25,48,0.95)" stroke="rgba(232,238,252,0.14)"/>
    <rect x="90" y="70" width="1020" height="72" rx="28" fill="rgba(255,255,255,0.04)"/>
    <text x="150" y="115" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="18" font-weight="800">Escalation alert</text>

    <rect x="124" y="170" width="952" height="140" rx="18" fill="rgba(255,69,58,0.10)" stroke="rgba(255,69,58,0.26)"/>
    <text x="150" y="210" fill="rgba(232,238,252,0.96)" font-family="Inter,system-ui" font-size="18" font-weight="900">★☆☆☆☆ New 1-star review — needs human now</text>
    <text x="150" y="242" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">“They messed up my order and ignored me.”</text>
    <text x="150" y="272" fill="rgba(167,178,214,0.95)" font-family="Inter,system-ui" font-size="12" font-weight="700">Suggested action:</text>
    <text x="270" y="272" fill="rgba(232,238,252,0.9)" font-family="Inter,system-ui" font-size="12" font-weight="800">Apologize + move offline + offer resolution path</text>

    <rect x="124" y="332" width="620" height="358" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(232,238,252,0.10)"/>
    <text x="150" y="372" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="13" font-weight="900">Ready-to-send draft (safe)</text>
    <text x="150" y="408" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">We’re really sorry this happened. That’s not the experience we want you to have.</text>
    <text x="150" y="432" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">If you’re open to it, please call us at (555) 123-4567 so we can fix this quickly.</text>
    <text x="150" y="456" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">We’ll review what happened and make it right.</text>

    <rect x="774" y="332" width="302" height="358" rx="18" fill="rgba(255,214,10,0.08)" stroke="rgba(255,214,10,0.22)"/>
    <text x="800" y="372" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="13" font-weight="900">Checklist</text>

    <g fill="rgba(232,238,252,0.85)" font-family="Inter,system-ui" font-size="13" font-weight="700">
      <text x="800" y="412">1) Identify order / appointment</text>
      <text x="800" y="444">2) Call within 30 minutes</text>
      <text x="800" y="476">3) Offer resolution option</text>
      <text x="800" y="508">4) Log outcome internally</text>
      <text x="800" y="540">5) Follow up in 24h</text>
    </g>

    <rect x="900" y="608" width="176" height="48" rx="999" fill="url(#g)"/>
    <text x="936" y="639" fill="#081023" font-family="Inter,system-ui" font-size="13" font-weight="900">Notify team</text>
  </g>
</svg>
