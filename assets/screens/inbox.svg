<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#27d4ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f1930"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="transparent"/>

  <!-- Window -->
  <g filter="url(#shadow)">
    <rect x="70" y="60" width="1060" height="640" rx="28" fill="url(#bg)" stroke="rgba(232,238,252,0.14)"/>
    <rect x="70" y="60" width="1060" height="72" rx="28" fill="rgba(255,255,255,0.04)"/>
    <circle cx="120" cy="96" r="10" fill="rgba(255,69,58,0.9)"/>
    <circle cx="152" cy="96" r="10" fill="rgba(255,214,10,0.9)"/>
    <circle cx="184" cy="96" r="10" fill="rgba(48,209,88,0.9)"/>

    <text x="220" y="104" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="18" font-weight="700">ReplyPilot — Review Inbox</text>

    <!-- Left nav -->
    <rect x="94" y="156" width="230" height="520" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(232,238,252,0.10)"/>
    <rect x="118" y="190" width="182" height="42" rx="12" fill="rgba(124,92,255,0.22)" stroke="rgba(124,92,255,0.45)"/>
    <text x="138" y="216" fill="rgba(232,238,252,0.95)" font-family="Inter,system-ui" font-size="14" font-weight="800">Inbox</text>
    <text x="138" y="255" fill="rgba(232,238,252,0.7)" font-family="Inter,system-ui" font-size="13" font-weight="600">Locations</text>
    <rect x="118" y="270" width="182" height="10" rx="5" fill="rgba(232,238,252,0.10)"/>
    <rect x="118" y="290" width="160" height="10" rx="5" fill="rgba(232,238,252,0.10)"/>
    <rect x="118" y="310" width="150" height="10" rx="5" fill="rgba(232,238,252,0.10)"/>
    <text x="138" y="360" fill="rgba(232,238,252,0.7)" font-family="Inter,system-ui" font-size="13" font-weight="600">Star Rules</text>
    <rect x="118" y="375" width="182" height="10" rx="5" fill="rgba(232,238,252,0.10)"/>
    <rect x="118" y="395" width="140" height="10" rx="5" fill="rgba(232,238,252,0.10)"/>

    <!-- Main list -->
    <rect x="350" y="156" width="756" height="520" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(232,238,252,0.10)"/>

    <!-- Header row -->
    <rect x="372" y="178" width="712" height="54" rx="14" fill="rgba(255,255,255,0.03)"/>
    <text x="396" y="212" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="14" font-weight="800">New reviews</text>
    <rect x="925" y="192" width="140" height="30" rx="999" fill="url(#g)"/>
    <text x="946" y="213" fill="#081023" font-family="Inter,system-ui" font-size="13" font-weight="900">Generate replies</text>

    <!-- Rows -->
    <!-- row 1 -->
    <rect x="372" y="252" width="712" height="96" rx="16" fill="rgba(124,92,255,0.08)" stroke="rgba(124,92,255,0.28)"/>
    <circle cx="402" cy="300" r="18" fill="rgba(39,212,255,0.25)"/>
    <text x="432" y="286" fill="rgba(232,238,252,0.95)" font-family="Inter,system-ui" font-size="14" font-weight="900">★★★★★</text>
    <text x="432" y="310" fill="rgba(232,238,252,0.85)" font-family="Inter,system-ui" font-size="13" font-weight="600">“Fast appointment, super friendly staff.”</text>
    <text x="432" y="332" fill="rgba(167,178,214,0.95)" font-family="Inter,system-ui" font-size="12" font-weight="600">Auto-reply suggested • Brand voice: Warm + concise</text>
    <rect x="950" y="286" width="110" height="28" rx="999" fill="rgba(48,209,88,0.18)" stroke="rgba(48,209,88,0.35)"/>
    <text x="973" y="305" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="12" font-weight="900">Auto-safe</text>

    <!-- row 2 -->
    <rect x="372" y="362" width="712" height="96" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(232,238,252,0.10)"/>
    <circle cx="402" cy="410" r="18" fill="rgba(255,214,10,0.18)"/>
    <text x="432" y="396" fill="rgba(232,238,252,0.95)" font-family="Inter,system-ui" font-size="14" font-weight="900">★★★☆☆</text>
    <text x="432" y="420" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">“Good service but wait time was long.”</text>
    <text x="432" y="442" fill="rgba(167,178,214,0.95)" font-family="Inter,system-ui" font-size="12" font-weight="600">Draft-only • Suggest apology + next-step</text>
    <rect x="946" y="396" width="118" height="28" rx="999" fill="rgba(255,214,10,0.16)" stroke="rgba(255,214,10,0.30)"/>
    <text x="970" y="415" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="12" font-weight="900">Review</text>

    <!-- row 3 -->
    <rect x="372" y="472" width="712" height="96" rx="16" fill="rgba(255,69,58,0.08)" stroke="rgba(255,69,58,0.22)"/>
    <circle cx="402" cy="520" r="18" fill="rgba(255,69,58,0.18)"/>
    <text x="432" y="506" fill="rgba(232,238,252,0.95)" font-family="Inter,system-ui" font-size="14" font-weight="900">★☆☆☆☆</text>
    <text x="432" y="530" fill="rgba(232,238,252,0.82)" font-family="Inter,system-ui" font-size="13" font-weight="600">“They messed up my order and ignored me.”</text>
    <text x="432" y="552" fill="rgba(167,178,214,0.95)" font-family="Inter,system-ui" font-size="12" font-weight="600">Escalate now • Checklist: refund? call? replacement?</text>
    <rect x="936" y="506" width="128" height="28" rx="999" fill="rgba(255,69,58,0.16)" stroke="rgba(255,69,58,0.30)"/>
    <text x="958" y="525" fill="rgba(232,238,252,0.92)" font-family="Inter,system-ui" font-size="12" font-weight="900">Escalate</text>

  </g>
</svg>
